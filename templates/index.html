<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merter Halı Yıkama Rota</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light" style="max-width: 500px; margin: 0 auto;">

    <div class="container my-4">
        <div class="card shadow-sm border-0 bg-dark text-white mb-4">
            <div class="card-body text-center">
                <h2 class="card-title m-0 fw-bold">🚚 Merter Halı Yıkama</h2>
                <small class="text-warning">Akıllı Rota Optimizasyon Sistemi</small>
            </div>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body">
                <h5 class="card-title fw-bold text-secondary mb-3">📍 Günlük Adres Girişi</h5>
                <p class="text-muted small">Her satıra sadece bir adres gelecek şekilde yaz baba. Kısaltma kullanabilirsin.</p>

                <form action="/rota-hesapla" method="POST">
                    <div class="mb-3">
                        <textarea class="form-control" name="adresler" rows="8" style="font-size: 16px; border-radius: 8px;" placeholder="Örn:&#10;sütlüce mah. 2.yayla sokak&#10;esentepe mah. oruç reis sk"></textarea>
                    </div>

                    <button type="submit" class="btn btn-success btn-lg w-100 py-3 fw-bold shadow-sm" style="border-radius: 10px; font-size: 18px;">
                        🚀 En İyi Rotayı Çiz
                    </button>
                </form>
            </div>
        </div>
    </div>
<script>
        window.onload = function() {
            // Hafızada kurtarılmayı bekleyen adres paketi var mı diye bakıyoruz
            var eskiAdreslerJSON = localStorage.getItem('eski_basarili_adresler');
            var hataliAdres = localStorage.getItem('duzeltilecek_hatali_adres');
            var textarea = document.querySelector('textarea[name="adresler"]');

            if (textarea) {
                if (eskiAdreslerJSON) {
                    var adresDizisi = JSON.parse(eskiAdreslerJSON);
                    
                    // Eğer düzeltilecek hatalı bir adres varsa onu da listenin en sonuna ekle
                    if (hataliAdres) {
                        adresDizisi.push(hataliAdres);
                    }
                    
                    // Tüm adresleri aralarına satır atlatarak kutunun içine geri diziyoruz!
                    textarea.value = adresDizisi.join("\n");
                    
                    // Hafızayı temizle ki sonraki girişlerde ekran temiz gelsin
                    localStorage.removeItem('eski_basarili_adresler');
                    localStorage.removeItem('duzeltilecek_hatali_adres');
                } else if (hataliAdres) {
                    // Sadece hatalı adres varsa tek başına yaz (Yedek koruma)
                    textarea.value = hataliAdres;
                    localStorage.removeItem('duzeltilecek_hatali_adres');
                }
            }
        }
    </script>
</body>
</html>
